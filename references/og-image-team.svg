<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fafaf7"/>

  <!-- Subtle warm wash on the right side -->
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbe9e0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fbe9e0" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d94a1f"/>
      <stop offset="100%" stop-color="#b13a13"/>
    </linearGradient>
  </defs>
  <rect x="700" y="0" width="500" height="630" fill="url(#wash)"/>

  <!-- Top-left wordmark -->
  <g transform="translate(72, 78)">
    <circle cx="14" cy="14" r="10" fill="url(#dot)"/>
    <text x="38" y="22" font-family="JetBrains Mono" font-size="22" font-weight="700" fill="#14151a" letter-spacing="0.5">oddlympics</text>
  </g>

  <!-- Banner pill -->
  <g transform="translate(72, 168)">
    <rect x="0" y="0" rx="999" ry="999" width="430" height="40" fill="#fbe9e0" stroke="#d94a1f" stroke-width="1.5"/>
    <text x="20" y="26" font-family="JetBrains Mono" font-size="14" font-weight="700" letter-spacing="2.2" fill="#d94a1f">WORLD CUP 2026 · JUNE 11 – JULY 19</text>
  </g>

  <!-- Headline (parameterized — D-05/D-07/D-08) -->
  <g transform="translate(72, 252)" font-family="Inter" fill="#14151a">
    <text x="0" y="0" font-size="{{HEADLINE_FONT_SIZE}}" font-weight="700" letter-spacing="-1.2">Following {{TEAM_LABEL}}.</text>
    <text x="0" y="74" font-size="{{HEADLINE_FONT_SIZE}}" font-weight="700" letter-spacing="-1.2">Every match in your zone.</text>
    <text x="0" y="148" font-size="{{HEADLINE_FONT_SIZE}}" font-weight="700" letter-spacing="-1.2" fill="#d94a1f">One ping before kickoff.</text>
  </g>

  <!-- Sub line -->
  <g transform="translate(72, 488)">
    <text font-family="Inter" font-size="22" fill="#5a5d68">Pick your team. Free for the whole tournament. No ads.</text>
  </g>

  <!-- URL -->
  <g transform="translate(72, 550)">
    <text font-family="JetBrains Mono" font-size="20" font-weight="600" fill="#14151a">oddlympics.app</text>
  </g>

  <!-- Right-side decorative flags (simple color blocks representing fan diversity) -->
  <g transform="translate(880, 200)">
    <!-- Argentina-ish -->
    <rect x="0" y="0" width="80" height="50" rx="6" fill="#6CACE4"/>
    <rect x="0" y="16" width="80" height="18" fill="#F6F6F6"/>
    <!-- Mexico-ish -->
    <rect x="100" y="0" width="80" height="50" rx="6" fill="#006847"/>
    <rect x="126" y="0" width="28" height="50" fill="#F6F6F6"/>
    <rect x="154" y="0" width="26" height="50" fill="#CE1126"/>
    <!-- Brazil-ish -->
    <rect x="50" y="70" width="80" height="50" rx="6" fill="#009B3A"/>
    <polygon points="90,76 124,95 90,114 56,95" fill="#FFDF00"/>
    <!-- England-ish -->
    <rect x="150" y="70" width="80" height="50" rx="6" fill="#F6F6F6"/>
    <rect x="186" y="70" width="8" height="50" fill="#CE1124"/>
    <rect x="150" y="91" width="80" height="8" fill="#CE1124"/>
    <!-- Nigeria-ish -->
    <rect x="0" y="140" width="80" height="50" rx="6" fill="#008751"/>
    <rect x="26" y="140" width="28" height="50" fill="#F6F6F6"/>
    <!-- Japan-ish -->
    <rect x="100" y="140" width="80" height="50" rx="6" fill="#F6F6F6"/>
    <circle cx="140" cy="165" r="14" fill="#BC002D"/>
  </g>

  <!-- Bottom right tag -->
  <g transform="translate(1042, 588)">
    <text text-anchor="end" font-family="JetBrains Mono" font-size="14" fill="#5a5d68">Independent project · Not affiliated with FIFA</text>
  </g>
</svg>
